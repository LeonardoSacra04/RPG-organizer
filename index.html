<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>
            <h1>RPG Organizer</h1>
        </header>

        <!-- LISTA DE PLAYERS -->
        <section id="players">
            <h2>Players</h2>

            <section>
                <h3>Aliados</h3>
                <div id="Aliados"></div>
            </section>

            <section>
                <h3>Inimigos</h3>
                <div id="Inimigos"></div>
            </section>
        </section>

        <!-- CONTROLES -->
        <section id="botoes">
            <h2>Ações</h2>

            <button id="btn-criar">Adicionar Personagem</button>
            <button id="btn-limpar-mortos">Remover Mortos</button>
            <button id="btn-combate">Iniciar Combate</button>
        </section>

        <!-- COMBATE -->
        <section id="combate"> 
            <header>
                <h2 id="rodada">Rodada 0</h2>
                <p>Vez de <strong id="rodada-player"></strong></p>
            </header>

            <div class="acoes-combate">
                <button id="btn-passar">Passar Rodada</button>
                <button id="btn-atacar">Atacar</button>
                <button id="btn-remover-status">Remover Status</button>
                <button id="btn-finalizar">Finalizar Combate</button>
            </div>

            <section id="log-combate">
                <h3>Log do Combate</h3>
            </section>
        </section>
    </main>

    <!-- MODAL CRIAR PLAYER -->
    <dialog id="criando-player">
        <form method="dialog">
            <h2>Adicionar Personagem</h2>

            <label>
                Nome:
                <input type="text" id="nome" required>
            </label>

            <label>
                Vida:
                <input type="number" id="vida" required>
            </label>

            <label>
                Iniciativa:
                <input type="number" id="iniciativa" required>
            </label>

            <label>
                Lado:
                <select id="lado">
                    <option value="1">Aliado</option>
                    <option value="2">Inimigo</option>
                </select>
            </label>

            <menu>
                <button id="salvar">Salvar</button>
                <button id="cancelar" type="button">Cancelar</button>
            </menu>
        </form>
    </dialog>

    <!-- MODAL ATAQUE -->
    <dialog id="modal-ataque">
        <form method="dialog">
            <h2>Ataque</h2>

            <label>
                Alvo:
                <select id="alvo"></select>
            </label>

            <label>
                Dano:
                <input type="number" id="dano">
            </label>

            <label>
                Status:
                <input type="text" id="status" placeholder="Ex: envenenado">
            </label>

            <menu>
                <button id="confirmar-ataque">Confirmar</button>
                <button id="cancelar-ataque" type="button">Cancelar</button>
            </menu>
        </form>
    </dialog>

    <!-- MODAL STATUS -->
    <dialog id="modal-status">
        <form method="dialog">
            <h2>Remover Status</h2>

            <label>
                Player:
                <select id="player-status"></select>
            </label>

            <label>
                Status:
                <select id="lista-status"></select>
            </label>

            <menu>
                <button id="confirmar-remocao">Remover</button>
                <button id="cancelar-remocao" type="button">Cancelar</button>
            </menu>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
