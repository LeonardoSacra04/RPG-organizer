<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Organizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/combate.css">
    <link rel="stylesheet" href="css/notas.css">
    <link rel="stylesheet" href="css/player-cards.css">
</head>
<body>
<div id="turno-carousel"></div>
<main id="layout">
    <section id="players-section">
        <h1>Players</h1>

        <section>
            <h2>Aliados</h2>
            <section id="Aliados"></section>
        </section>

        <section>
            <h2>Inimigos</h2>
            <section id="Inimigos"></section>
        </section>
        
        <section id="botoes">
            <button id="btn-criar">Adicionar Personagem</button>
            <button id="btn-limpar-mortos">Remover Mortos</button>
            <button id="btn-combate">Iniciar Combate</button>
        </section>
    </section>
    
    <!-- COMBATE -->
    <section id="combate">
        <h2 id="rodada">Rodada 0</h2>
        <h3>Vez de <span id="rodada-player"></span></h3>

        <button id="btn-passar">Passar Turno</button>
        <button id="btn-atacar">Atacar</button>
        <button id="btn-remover-status">Remover Status</button>
        <button id="btn-finalizar">Finalizar</button>

        <section id="log-container">
            <h3>Log de Combate</h3>
            <div id="log-combate"></div>
        </section>
    </section>

    <!-- ANOTAÇÕES -->
    <div id="overlay"></div>

    <section id="notas">
        <button id="toggle-notas">
            <span class="icone-seta">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M8 5l8 7-8 7" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
            </span>
        </button>

            <h2>Anotações</h2>

        <textarea id="campo-notas" placeholder="Escreva suas anotações..."></textarea>
    </section>
</main>

<!-- MODAL PLAYER -->
<form id="criando-player" class="modal">
    <article id="preview-card"></article>
    <article class="modal-player-card">
        <div class="modal-player-header">
            <div class="modal-player-avatar">
                <img id="preview-avatar" src="images/generic-icon.png">
                <input type="file" id="imagem-player" accept="image/*">
            </div>
            <div class="modal-player-info">
                <h3><input type="text" id="nome" placeholder="Nome" required></h3>
                <div class="hp-text">
                    <input type="number" id="vida-atual" placeholder="-" max="999" min="0"><span id="remove-p">/</span>
                    <input type="number" id="vida" placeholder="0" max="999" min="0" required> <span>HP</span>
                </div>
                <div class="barra-vida-modal">
                    <span id="preview-barra-vida"></span>
                </div>
                <div class="status-modal" id="preview-status">
                    Sem status
                </div>
                <div class="lado-container">
                    <select id="lado">
                        <option value="1">Aliado</option>
                        <option value="2">Inimigo</option>
                    </select>
                </div>
            </div>
            <div class="iniciativa-container">
                <input type="number" id="iniciativa" placeholder="0" required>
            </div>
        </div>
    </article>
    <article id="btn-modal">
        <button type="submit" id="salvar">Salvar</button>
        <button type="button" id="cancelar">Cancelar</button>
        <button type="button" id="deletar-player">Deletar</button>
    </article>
</form>

<!-- MODAL ATAQUE -->
<form id="modal-ataque" class="modal">
    <h2>Ataque</h2>

    <select id="alvo"></select>
    <input type="number" id="dano" placeholder="Dano" required>
    <input type="text" id="status" placeholder="Status">

    <button type="submit" id="confirmar-ataque">Confirmar</button>
    <button type="button" id="cancelar-ataque">Cancelar</button>
</form>

<!-- MODAL STATUS -->
<form id="modal-status" class="modal">
    <h2>Remover Status</h2>

    <select id="player-status"></select>
    <select id="lista-status"></select>

    <button type="submit" id="confirmar-remocao">Remover</button>
    <button type="button" id="cancelar-remocao">Cancelar</button>
</form>

<script src="js/player.js"></script>
<script src="js/combate.js"></script>
<script src="js/notas.js"></script>
<script src="js/state.js"></script>
</body>
</html>
